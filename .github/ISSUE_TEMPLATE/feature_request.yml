name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem or gap
      description: What is missing or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What you would like
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
    validations:
      required: false
